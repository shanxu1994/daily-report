name: Sync To Gitee

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror to Gitee
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
        with:
          source-repo: git@github.com:shanxu1994/daily-report.git
          destination-repo: git@gitee.com:senxia-1994/daily-report.git

  deploy-pages:
    # 将此片段加入到 deploy-pages job steps 的第一项（临时用于调试）
- name: Check Gitee token and repo access
  run: |
    echo "Check current user"
    curl -s "https://gitee.com/api/v5/user?access_token=${{ secrets.GITEE_PASSWORD }}" -w "\nHTTP_CODE:%{http_code}\n"
    echo "Check repo info"
    curl -s "https://gitee.com/api/v5/repos/senxia-1994/daily-report?access_token=${{ secrets.GITEE_PASSWORD}}" -w "\nHTTP_CODE:%{http_code}\n"needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Gitee Pages
        uses: yanglbme/gitee-pages-action@main
        with:
          gitee-username: senxia-1994
          gitee-password: ${{ secrets.GITEE_PASSWORD }}
          gitee-repo: senxia-1994/daily-report
          branch: main
